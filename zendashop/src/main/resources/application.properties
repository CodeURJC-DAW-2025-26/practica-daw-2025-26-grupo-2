spring.application.name=zendashop
spring.mustache.suffix=.html
logging.level.org.springframework.web=DEBUG

spring.datasource.url=jdbc:mysql://localhost/zenda
spring.datasource.username=root

#Environment variable for each developer’s individual MySQL password.
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=create-drop
#To display the SQL statements that Spring generates in the console
spring.jpa.show-sql=true
#Formats the SQL to make it readable
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
