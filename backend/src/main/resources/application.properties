server.port=8443
server.ssl.key-store = classpath:keystore.jks
server.ssl.key-store-password = password
server.ssl.key-password = secret
spring.mustache.suffix=.html
logging.level.org.springframework.web=TRACE

spring.datasource.url=jdbc:mysql://localhost:3306/zenda
spring.datasource.username=root

#Environment variable for each developer’s individual MySQL password.
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=create-drop
#To display the SQL statements that Spring generates in the console
spring.jpa.show-sql=true
#Formats the SQL to make it readable
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
