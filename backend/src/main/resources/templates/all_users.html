<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/header_style.css">
    <link rel="stylesheet" href="/footer_style.css">

    <title>Gestión de usuarios | ZENDA</title>
</head>

<body class="body">
    {{>header}}
    <main class="container container-main mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Gestión de Usuarios</h2>
            <button class="btn btn-success">
                Añadir usuario <i class="bi bi-plus-circle"></i>
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Administrador</th>
                        <th class="d-none d-md-table-cell">Fecha de alta</th>
                        <th class="d-none d-md-table-cell">Nº pedidos</th>
                        <th class="d-none d-lg-table-cell">Último pedido</th>

                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    {{#users}}
                    <tr>
                        <td>{{id}}</td>
                        <td>{{name}}</td>
                        <td>{{email}}</td>
                        <td>{{admin}}</td>
                        <td class="d-none d-md-table-cell">{{creationDate}}</td>
                        <td class="d-none d-md-table-cell">{{orderCount}}</td>
                        <td class="d-none d-lg-table-cell">{{lastOrderDate}}</td>

                        <td class="d-flex flex-wrap gap-2">
                            <a class="btn btn-info btn-sm" href="user_profile.html">
                                Ver <i class="bi bi-eye"></i>
                            </a>
                            <a class="btn btn-warning btn-sm" href="register.html">
                                Editar <i class="bi bi-pencil-square"></i>
                            </a>
                            <a class="btn btn-danger btn-sm" href="#">
                                Borrar <i class="bi bi-x-lg"></i>
                            </a>
                        </td>
                    </tr>
                    {{/users}}
                </tbody>
            </table>
        </div>

        <div class="text-center mt-4">
            <button class="btn btn-primary">
                Cargar más <i class="bi bi-arrow-down-circle"></i>
            </button>
        </div>

    </main>
    {{>footer}}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
