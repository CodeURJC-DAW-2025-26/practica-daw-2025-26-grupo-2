<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/login.css">

  <title>Registro | ZENDA</title>
</head>

<body class="body">
  <main class="login-page">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-11 col-md-9 col-lg-8">
          <section class="login-card">
            <div class="login-header">
              <h1 class="login-title">
                {{#user}}Editar perfil{{/user}}
                {{^user}}Crear cuenta{{/user}}
              </h1>
            </div>

            <form action="{{#user}}/user/{{id}}/edit{{/user}}{{^user}}/register{{/user}}" method="post" enctype="multipart/form-data">
              <input type="hidden" name="_csrf" value="{{token}}">
              
              <div class="text-center mb-3">
                {{#user.hasAvatar}}
                  <img src="/user/{{user.id}}/avatar" alt="Tu Avatar" class="rounded-circle mb-2" width="96" height="96" style="object-fit: cover;">
                {{/user.hasAvatar}}
                {{^user.hasAvatar}}
                  <img src="../demo/avatar_default.png" alt="Avatar por defecto" class="rounded-circle mb-2" width="96" height="96">
                {{/user.hasAvatar}}

                <div class="mb-2">
                  <label for="avatar" class="form-label d-block">Imagen de perfil</label>
                  <input type="file" id="avatar" name="imageAvatar" class="form-control" accept="image/*">
                </div>
              </div>

              <div class="mb-3">
                <label for="name" class="form-label">Nombre</label>
                <div class="input-group">
                  <span class="input-group-text login-addon"><i class="bi bi-person"></i></span>
                  <input type="text" id="name" name="name" class="form-control" placeholder="Tu nombre" value="{{#user}}{{name}}{{/user}}" required>
                </div>
              </div>

              <div class="mb-3">
                <label for="surname" class="form-label">Apellidos</label>
                <div class="input-group">
                  <span class="input-group-text login-addon"><i class="bi bi-person-lines-fill"></i></span>
                  <input type="text" id="surname" name="surname" class="form-control" placeholder="Tus apellidos" value="{{#user}}{{surname}}{{/user}}" required>
                </div>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-group">
                  <span class="input-group-text login-addon"><i class="bi bi-envelope"></i></span>
                  <input type="email" id="email" name="email" class="form-control" placeholder="tuemail@ejemplo.com" value="{{#user}}{{email}}{{/user}}" required>
                </div>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">
                  Contraseña {{#user}}<small class="text-muted">(Déjalo en blanco para no cambiarla)</small>{{/user}}
                </label>
                <div class="input-group">
                  <span class="input-group-text login-addon"><i class="bi bi-lock"></i></span>
                  <input type="password" id="password" name="encodedPassword" class="form-control" placeholder="••••••••" {{^user}}required{{/user}}>
                </div>
              </div>

              <div class="mb-3">
                <label for="adress" class="form-label">Dirección</label>
                <div class="input-group">
                  <span class="input-group-text login-addon"><i class="bi bi-geo-alt"></i></span>
                  <input type="text" id="adress" name="adress" class="form-control" placeholder="C/ Ejemplo 123, 28000" value="{{#user}}{{adress}}{{/user}}">
                </div>
              </div>

              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                  {{#user}}Guardar cambios{{/user}}
                  {{^user}}Crear cuenta{{/user}}
                </button>
              </div>

              {{^user}}
              <div class="login-divider">
                <span>o</span>
              </div>

              <div class="d-grid gap-2">
                <a href="/" class="btn btn-secondary login-secondary">Volver a la tienda</a>
              </div>

              <p class="login-footer mt-3">
                ¿Ya tienes cuenta? <a href="/login" class="login-link">Iniciar sesión</a>
              </p>
              {{/user}}

            </form>
          </section>

        </div>
      </div>
    </div>
  </main>

</body>

</html>
