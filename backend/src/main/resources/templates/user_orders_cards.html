{{#orders}}
<tr class="user-order-item">
    <td>{{id}}</td>
    <td>{{convertCreationDateToLocalDate}}</td>
    <td>{{totalPrice}}€</td>
    <td>
        <a class="btn btn-info btn-sm" href="/order/{{id}}">
            Ver detalle <i class="bi bi-eye"></i>
        </a>
        <a class="btn btn-success btn-sm" href="/orders/{{id}}/invoice">
            Generar factura <i class="bi bi-file-earmark-pdf"></i>
        </a>
    </td>
</tr>
{{/orders}}
{{^orders}}
<tr>
    <td colspan="4">No hay pedidos disponibles.</td>
</tr>
{{/orders}}
