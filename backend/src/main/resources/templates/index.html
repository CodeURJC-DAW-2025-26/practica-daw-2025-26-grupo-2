<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/header_style.css">
  <link rel="stylesheet" href="/footer_style.css">

  <title>Main | ZENDA</title>
</head>

<body class="body">
  {{>header}}
  {{#logged}}
  <section class="offers-section py-5">
    <div class="container container-main-offers">
      <div class="d-flex align-items-center justify-content-center mb-5 container-offers-title">
        <hr class="flex-grow-1 d-none d-sm-block border-2">
        <h2 class="text-center mx-4 fw-bold mb-0 text-uppercase">Recomendaciones para ti</h2>
        <hr class="flex-grow-1 d-none d-sm-block border-2">
      </div>
      <div class="row" id="offers-list">
        {{#offers}}
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 garment-item">
          <a href="/garment/{{id}}">
            <img src="/garment/{{id}}/image" class="img-fluid">
          </a>
          <h4>{{name}}</h4>
          <h5>{{price}}€</h5>
        </div>
        {{/offers}}

        {{^offers}}
        <div class="col-12 d-flex justify-content-center">
          <p class="text-muted fs-5 text-center my-5">
            Te mantendremos informado con próximas novedades
          </p>
        </div>
        {{/offers}}
      </div>
    </div>
  </section>
  {{/logged}}

  <main class="container py-5 px-4">
    <div class="container container-main">
      <div class="position-relative d-flex align-items-center justify-content-center mb-4">

          <a href="/garment/new"
            class="btn btn-primary btn-sm position-absolute start-0 d-flex align-items-center gap-2">
            Añadir prenda <i class="bi bi-plus-circle"></i>
          </a>


          <h2 class="title mb-0">Artículos</h2>

          <button
            class="btn btn-outline-dark btn-sm position-absolute end-0 d-flex align-items-center gap-2 text-uppercase fw-bold"
            type="button" data-bs-toggle="collapse" data-bs-target="#filterCollapse">
            <i class="bi bi-sliders"></i>
            <span class="d-none d-sm-inline">Filtrar</span>
          </button>
        </div>

        <div class="collapse mb-5" id="filterCollapse">
          <div class="card card-body border-0 shadow-sm bg-light">
            <form class="filters" action="/" method="get">
              <div class="row g-3">
                <div class="col-12 col-md-3">
                  <label class="form-label small fw-bold text-uppercase text-muted"
                    style="font-size: 0.7rem;">Buscar</label>
                  <input type="text" class="form-control form-control-sm border-0 shadow-sm"
                    placeholder="Ej: Pantalón denim..." name="nameSearch">
                </div>

                <div class="col-6 col-md-2">
                  <label class="form-label small fw-bold text-uppercase text-muted"
                    style="font-size: 0.7rem;">Categoría</label>
                  <select class="form-select form-select-sm border-0 shadow-sm" name="categorySearch">
                    <option selected value="">Todas</option>
                    <option value="Camisas">Camisas</option>
                    <option value="Pantalones">Pantalones</option>
                    <option value="Zapatos">Zapatos</option>
                    <option value="Accesorios">Accesorios</option>
                    <option value="Otros">Otros</option>
                  </select>
                </div>

                <div class="col-6 col-md-3">
                  <label class="form-label small fw-bold text-uppercase text-muted" style="font-size: 0.7rem;">Rango de
                    Precio (€)</label>
                  <div class="d-flex align-items-center gap-2">
                    <input type="number" class="form-control form-control-sm border-0 shadow-sm" placeholder="Mín"
                      min="0" max="200" name="minPrice">
                    <span class="text-muted small">-</span>
                    <input type="number" class="form-control form-control-sm border-0 shadow-sm" placeholder="Máx"
                      min="0" max="500" name="maxPrice">
                  </div>
                </div>

                <div class="col-6 col-md-2">
                  <label class="form-label small fw-bold text-uppercase text-muted"
                    style="font-size: 0.7rem;">Ordenar</label>
                  <select class="form-select form-select-sm border-0 shadow-sm" name="sort">
                    <option selected value="">Seleccione</option>
                    <option value="price,asc">Precio: Menor a Mayor</option>
                    <option value="price,desc">Precio: Mayor a Menor</option>
                  </select>
                </div>

                <div class="col-6 col-md-2 d-flex align-items-end">
                  <button class="btn btn-dark btn-sm w-100 fw-bold text-uppercase shadow-sm filters"
                    style="letter-spacing: 1px;" type="submit">
                    Aplicar
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
        <div class="row" id="garments-list" class="filter">
          {{>garments_cards}}
        </div>
      </div>
  </main>

  {{#admin}}
  <div class="text-center mt-4">
    <a href="{{loadMoreLink}}" class="btn btn-primary" class="filters">
      Cargar más <i class="bi bi-plus-circle"></i>
    </a>
  </div>
  {{/admin}}
  {{>footer}}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll('filters').forEach(element => {
      element.addEventListener('click', function () {
        const fields = this.querySelectorAll('input[name], select[name], textarea[name]');

      fields.forEach(el => {
        const value = (el.value ?? '').trim();

          if (value === '') {
            el.disabled = true;
            return;
          }
        });
      });
    });
  </script>
</body>

</html>
