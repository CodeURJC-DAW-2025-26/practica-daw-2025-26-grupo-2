<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/header_style.css">
    <link rel="stylesheet" href="/footer_style.css">

    <title>Gestión de pedidos | ZENDA</title>
</head>

<body class="body">
    {{>header}}
    <div class="container container-main mt-5">
        <h2 class="text-center mb-4">Gestión de Pedidos</h2>

        <div class="text-end mb-3">
            <button type="button" class="btn btn-success">
                Añadir pedido <i class="bi bi-plus-circle"></i>
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead class="table-light">
                    <tr>
                        <th>ID del Pedido</th>
                        <th>Correo Usuario</th>
                        <th>Fecha del Pedido</th>
                        <th>Precio Total</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {{#orders}}
                    <tr>
                        <td>{{id}}</td>
                        <td>{{user.email}}</td>
                        <td>{{creationDate}}</td>
                        <td>{{totalPrice}}€</td>
                        <td class = "d-flex flex-wrap gap-2">
                            <a class="btn btn-info btn-sm d-inline" href="/order/{{id}}">
                                Ver detalle <i class="bi bi-eye"></i>
                            </a>
                            <form method="post" action="/order/{{id}}/edit">
                                <button class="btn btn-warning btn-sm" type="submit">
                                    Editar <i class="bi bi-pencil-square"></i>
                                </button>
                                <input type="hidden" name="_csrf" value="{{token}}">
                            </form>
                            <form method="post" action="/order/{{id}}/delete">
                                <button class="btn btn-danger btn-sm" type="submit">
                                    Borrar <i class="bi bi-x-lg"></i>
                                </button>
                                <input type="hidden" name="_csrf" value="{{token}}">
                            </form>
                        </td>
                    </tr>
                    {{/orders}}
                </tbody>
            </table>
        </div>

        <div class="text-center mt-4">
            <button type="button" class="btn btn-primary">
                Cargar más <i class="bi bi-arrow-down-circle"></i>
            </button>
        </div>
    </div>
    {{>footer}}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
