<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/header_style.css" />
  <link rel="stylesheet" href="/footer_style.css" />

  <title>Mis pedidos | ZENDA</title>
</head>

<body class="body">
  {{>header}}
  <div class="container container-main mt-5">
    <h2 class="text-center mb-4">Mis Pedidos</h2>

    <div class="table-responsive">
      <table class="table table-bordered table-striped">
        <thead class="table-light">
          <tr>
            <th>ID del Pedido</th>
            <th>Fecha del Pedido</th>
            <th>Precio Total</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="user-orders-list">
          {{>user_orders_cards}}
        </tbody>
      </table>
    </div>

    {{#hasMore}}
    <div class="text-center mt-4">
      <button type="button" class="btn btn-primary"
        onclick="loadMore(event, '/loadMoreMyOrders?page=1', 'user-orders-list', 'user-order-item')">
        Cargar más <i class="bi bi-arrow-down-circle"></i>
      </button>
    </div>
    {{/hasMore}}
    <div class="text-center mt-4">
      <div id="loading-spinner" class="spinner d-none">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>
  </div>
  {{>footer}}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
